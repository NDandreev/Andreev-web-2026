{% extends "base.html" %}

{% block title %}Рецензия на книгу {{ book.title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h3>✍️ Рецензия на книгу "{{ book.title }}"</h3>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="rating" class="form-label">Оценка</label>
                        <select class="form-select" id="rating" name="rating" required>
                            <option value="5">5 – отлично</option>
                            <option value="4">4 – хорошо</option>
                            <option value="3">3 – удовлетворительно</option>
                            <option value="2">2 – неудовлетворительно</option>
                            <option value="1">1 – плохо</option>
                            <option value="0">0 – ужасно</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="text" class="form-label">Текст рецензии</label>
                        <textarea class="form-control" id="text" name="text" rows="8" required></textarea>
                        <small class="text-muted">Поддерживается форматирование Markdown</small>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('books.detail', book_id=book.id) }}" class="btn btn-secondary">Отмена</a>
                        <button type="submit" class="btn btn-primary">Отправить</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
