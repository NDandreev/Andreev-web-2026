{% extends 'base.html' %}

{% block content %}
<h1 class="mt-5 mb-4 text-center">Статистика по пользователям</h1>

<table class="table table-striped table-hover">
    <thead class="table-dark"><tr><th>№</th><th>Пользователь</th><th>Посещений</th></tr></thead>
    <tbody>
        {% for stat in stats %}
        <tr>
            <td>{{ stat.num }}</td>
            <td>{{ stat.user_name }}</td>
            <td><span class="badge bg-primary">{{ stat.count }}</span></td>
        </tr>
        {% else %}
        <tr><td colspan="3" class="text-center">Нет данных</td></tr>
        {% endfor %}
    </tbody>
</table>

<div class="mt-3 text-center">
    <a href="{{ url_for('statistics_export_users') }}" class="btn btn-success">Экспорт CSV</a>
    <a href="{{ url_for('statistics_journal') }}" class="btn btn-secondary">← Назад</a>
</div>
{% endblock %}
