{% extends 'base.html' %}

{% block content %}
<h1 class="mt-5 mb-4 text-center">Статистика по страницам</h1>

<table class="table table-striped table-hover">
    <thead class="table-dark"><tr><th>№</th><th>Страница</th><th>Посещений</th></tr></thead>
    <tbody>
        {% for stat in stats %}
        <tr>
            <td>{{ loop.index }}</td>
            <td><code>{{ stat.path }}</code></td>
            <td><span class="badge bg-primary">{{ stat.count }}</span></td>
        </tr>
        {% else %}
        <td><td colspan="3" class="text-center">Нет данных</td></tr>
        {% endfor %}
    </tbody>
</table>

<div class="mt-3 text-center">
    <a href="{{ url_for('statistics_export_pages') }}" class="btn btn-success">Экспорт CSV</a>
    <a href="{{ url_for('statistics_journal') }}" class="btn btn-secondary">← Назад к журналу</a>
</div>
{% endblock %}
